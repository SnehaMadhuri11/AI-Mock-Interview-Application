# Server Config
server.port=8081
spring.thymeleaf.cache=false

# Database Configuration (MySQL)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File Upload Configurations
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT Properties
# 512-bit HS512 secret key string (Hex encoded)
app.jwt.secret=${JWT_SECRET}
# Access token expiration: 1 Hour (3600000 ms)
app.jwt.accessTokenExpirationMs=3600000
# Refresh token expiration: 7 Days (604800000 ms)
app.jwt.refreshTokenExpirationMs=604800000

# Spring Mail Configuration (SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Gemini API Configurations
# Can be supplied via OS environment variable GEMINI_API_KEY
app.gemini.apiKey=${GEMINI_API_KEY}
app.gemini.apiUrl=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent

# Swagger / OpenAPI Path
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui/index.html
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha
